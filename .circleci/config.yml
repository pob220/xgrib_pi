version: 2.1

parameters:
  run_workflow_deploy:
    type: boolean
    default: false

commands:
  retain-linux-artifacts:
    steps:
      - run:
          name: Prepare retained evidence
          when: always
          command: |
            mkdir -p artifacts
            if test -d build/artifacts; then cp -a build/artifacts/. artifacts/; fi
      - store_test_results:
          path: artifacts
      - store_artifacts:
          path: artifacts
      - persist_to_workspace:
          root: .
          paths: [artifacts]

jobs:
  linux-catalogue:
    parameters:
      target: {type: string}
      image: {type: string}
      build_env: {type: string}
      dockerfile: {type: string, default: ci/Dockerfile.linux}
      resource_class: {type: string, default: medium}
    machine:
      image: ubuntu-2404:current
    resource_class: << parameters.resource_class >>
    environment:
      OCPN_TARGET: << parameters.target >>
      DOCKER_IMAGE: << parameters.image >>
      BUILD_ENV: << parameters.build_env >>
      DOCKERFILE: << parameters.dockerfile >>
      BUILD_GTK3: "true"
      WX_VER: "32"
      CMAKE_BUILD_PARALLEL_LEVEL: "3"
    steps:
      - checkout
      - run: chmod a+x ci/*.sh scripts/*.sh
      - run:
          name: Clean build, tests, package and validation
          command: ci/circleci-build-ubuntu-docker.sh
          no_output_timeout: 30m
      - retain-linux-artifacts

  flatpak:
    parameters:
      arch: {type: string}
      resource_class: {type: string, default: medium}
    machine:
      image: ubuntu-2404:current
    resource_class: << parameters.resource_class >>
    environment:
      OCPN_TARGET: flatpak
      BUILD_ARCH: << parameters.arch >>
      FLATPAK_BRANCH: stable
      CLOUDSMITH_PKG_EXT: gz
      SDK_VER: "25.08"
      WX_VER: "32"
    steps:
      - checkout
      - run: chmod a+x ci/*.sh scripts/*.sh
      - run:
          name: Flatpak build, package and in-runtime merge
          command: ci/circleci-build-flatpak.sh
          no_output_timeout: 45m
      - retain-linux-artifacts

  windows-vcpkg-dependencies:
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.medium
    environment:
      XGRIB_WINDOWS_DEPS_ONLY: "1"
    steps:
      - checkout
      - restore_cache:
          keys:
            - windows-vcpkg-2026-06-24-release-v3-{{ checksum "ci/windows-vcpkg-deps.txt" }}
      - run:
          name: Prepare cached Release-only Windows dependencies
          command: .\ci\circleci-build-windows.ps1
          no_output_timeout: 45m
      - save_cache:
          key: windows-vcpkg-2026-06-24-release-v3-{{ checksum "ci/windows-vcpkg-deps.txt" }}
          paths:
            - cache/vcpkg-binary

  windows-x86_64:
    machine:
      image: windows-server-2022-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.medium
    environment:
      OCPN_TARGET: MSVC
      WX_VER: "32"
    steps:
      - checkout
      - restore_cache:
          keys:
            - windows-vcpkg-2026-06-24-release-v3-{{ checksum "ci/windows-vcpkg-deps.txt" }}
      - run:
          name: Native Windows build, tests and package
          command: .\ci\circleci-build-windows.ps1
          no_output_timeout: 45m
      - store_test_results:
          path: artifacts
      - store_artifacts:
          path: artifacts
      - persist_to_workspace:
          root: .
          paths: [artifacts]

  macos-arm64:
    macos:
      xcode: 16.4.0
    resource_class: m4pro.medium
    environment:
      CMAKE_BUILD_PARALLEL_LEVEL: "3"
      HOMEBREW_NO_AUTO_UPDATE: "1"
    steps:
      - checkout
      - run: chmod a+x ci/*.sh scripts/*.sh
      - run:
          name: Native Apple-Silicon build, tests and package
          command: ci/circleci-build-macos-universal.sh
          no_output_timeout: 45m
      - store_test_results:
          path: artifacts
      - store_artifacts:
          path: artifacts
      - persist_to_workspace:
          root: .
          paths: [artifacts]

  deploy-alpha:
    docker:
      - image: cimg/python:3.13
    resource_class: small
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install deployment client
          command: python -m pip install --user cloudsmith-cli
      - run:
          name: Upload reviewed Alpha artifacts
          command: bash ci/deploy-alpha-artifacts.sh

workflows:
  validate:
    when:
      not: << pipeline.parameters.run_workflow_deploy >>
    jobs:
      - linux-catalogue:
          name: debian13-x86_64
          target: trixie
          image: debian:trixie
          build_env: debian
          filters: &std-filters
            branches:
              ignore: [devel, tmp]
            tags:
              only: /.*/
      - linux-catalogue:
          name: debian12-x86_64
          target: bookworm
          image: debian:bookworm
          build_env: debian
          filters: *std-filters
      - linux-catalogue:
          name: ubuntu22.04-x86_64
          target: jammy
          image: ubuntu:22.04
          build_env: ubuntu
          dockerfile: ci/Dockerfile.jammy
          filters: *std-filters
      - linux-catalogue:
          name: ubuntu24.04-x86_64
          target: noble
          image: ubuntu:24.04
          build_env: ubuntu
          filters: *std-filters
      - linux-catalogue:
          name: debian12-arm64
          target: bookworm-arm64
          image: arm64v8/debian:bookworm
          build_env: debian
          resource_class: arm.medium
          filters: *std-filters
      - flatpak:
          name: flatpak25.08-x86_64
          arch: x86_64
          filters: *std-filters
      - flatpak:
          name: flatpak25.08-arm64
          arch: aarch64
          resource_class: arm.medium
          filters: *std-filters
      - windows-vcpkg-dependencies:
          filters: *std-filters
      - windows-x86_64:
          requires: [windows-vcpkg-dependencies]
          filters: *std-filters
      - macos-arm64:
          filters: *std-filters

  deploy_reviewed_alpha:
    when: << pipeline.parameters.run_workflow_deploy >>
    jobs:
      - linux-catalogue:
          name: release-debian13-x86_64
          target: trixie
          image: debian:trixie
          build_env: debian
      - linux-catalogue:
          name: release-debian12-x86_64
          target: bookworm
          image: debian:bookworm
          build_env: debian
      - linux-catalogue:
          name: release-ubuntu22.04-x86_64
          target: jammy
          image: ubuntu:22.04
          build_env: ubuntu
          dockerfile: ci/Dockerfile.jammy
      - linux-catalogue:
          name: release-ubuntu24.04-x86_64
          target: noble
          image: ubuntu:24.04
          build_env: ubuntu
      - linux-catalogue:
          name: release-debian12-arm64
          target: bookworm-arm64
          image: arm64v8/debian:bookworm
          build_env: debian
          resource_class: arm.medium
      - flatpak:
          name: release-flatpak25.08-x86_64
          arch: x86_64
      - flatpak:
          name: release-flatpak25.08-arm64
          arch: aarch64
          resource_class: arm.medium
      - windows-vcpkg-dependencies:
          name: release-windows-vcpkg-dependencies
      - windows-x86_64:
          name: release-windows-x86_64
          requires: [release-windows-vcpkg-dependencies]
      - macos-arm64:
          name: release-macos-arm64
      - hold-for-alpha-approval:
          type: approval
          requires:
            - release-debian13-x86_64
            - release-debian12-x86_64
            - release-ubuntu22.04-x86_64
            - release-ubuntu24.04-x86_64
            - release-debian12-arm64
            - release-flatpak25.08-x86_64
            - release-flatpak25.08-arm64
            - release-windows-x86_64
            - release-macos-arm64
      - deploy-alpha:
          context: xgrib-deployment
          requires: [hold-for-alpha-approval]
